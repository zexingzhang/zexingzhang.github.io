bio:
  zh: |
    目前在国防科技大学攻读博士学位，研究聚焦基础模型驱动的智能感知与自主决策。
    围绕大语言模型、推理智能体和多模态生理信号，关注可验证评估、跨模态表示学习与真实场景泛化。
  en: |-
    I am currently pursuing a Ph.D. at the National University of Defense Technology, with research focused on foundation-model-driven intelligent perception and autonomous decision-making.
    My work centers on large language models, reasoning agents, and multimodal physiological signals, with interests in verifiable evaluation, cross-modal representation learning, and generalization in real-world scenarios.
research_profile:
  zh: 研究基础模型驱动的智能感知与自主决策。
  en: I study foundation-model-driven intelligent perception and autonomous decision-making.
